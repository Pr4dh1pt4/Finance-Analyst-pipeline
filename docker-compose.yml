x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    PIP_ADDITIONAL_REQUIREMENTS: "clickhouse-connect==0.7.19 pandas==2.2.2"
    DUSTINIA_DATA_DIR: /opt/airflow/include/data
    DUSTINIA_SQL_DIR: /opt/airflow/include/sql
    CLICKHOUSE_HOST: clickhouse
    CLICKHOUSE_HTTP_PORT: "8123"
    METABASE_URL: http://metabase:3000
  volumes:
    - ./dags:/opt/airflow/dags
    - ./include:/opt/airflow/include
    - ./sql:/opt/airflow/include/sql
    - ./logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    clickhouse:
      condition: service_healthy

services:
  # ------------------------------------------------------------------
  # Metadata DB for Airflow AND Metabase
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./include/scripts/init_metabase_db.sql:/docker-entrypoint-initdb.d/init_metabase_db.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    ports:
      - "5432:5432"

  # ------------------------------------------------------------------
  # ClickHouse — the analytical warehouse
  # ------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - chdata:/var/lib/clickhouse
    ports:
      - "8123:8123"   # HTTP interface (Metabase + Airflow use this)
      - "9000:9000"   # native protocol
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      retries: 10

  # ------------------------------------------------------------------
  # Airflow init (db migrate + admin user)
  # ------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Finance --lastname Analyst \
          --role Admin --email admin@dustinia.local || true
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ------------------------------------------------------------------
  # GeoJSON - Map Brazil
  # ------------------------------------------------------------------
  geojson:
    image: nginx:alpine
    volumes:
      - ./metabase-plugins:/usr/share/nginx/html:ro
    ports:
      - "8088:80"

  # ------------------------------------------------------------------
  # Metabase — the BI / dashboard layer
  # ------------------------------------------------------------------
  metabase:
    image: metabase/metabase:v0.50.21
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: "5432"
      MB_DB_USER: airflow
      MB_DB_PASS: airflow
      MB_DB_HOST: postgres
    volumes:
      - ./metabase-plugins:/plugins
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/api/health"]
      interval: 30s
      retries: 10

volumes:
  pgdata:
  chdata:
